server.port=${PORT:3001}
server.servlet.context-path=/api
spring.application.name=tripin-api-java
spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.problemdetails.enabled=false
debug=false
logging.level.root=INFO
spring.sql.init.mode=never
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT_MS:1500}ms
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT_MS:1500}ms

tripin.cache.post-detail.ttl-seconds=${POST_CACHE_TTL_SECONDS:300}
tripin.cache.post-detail.key-prefix=cache:post:
tripin.cache.hot-posts.key=hot:posts
tripin.cache.hot-posts.window-hours=${HOT_POSTS_WINDOW_HOURS:24}
tripin.cache.hot-posts.bucket-ttl-hours=${HOT_POSTS_BUCKET_TTL_HOURS:25}
tripin.bloomfilter.posts.key=bloom:posts
tripin.bloomfilter.posts.expected-items=${POST_BLOOM_EXPECTED_ITEMS:1000000}
tripin.bloomfilter.posts.false-positive-rate=${POST_BLOOM_FPR:0.01}

# JWT auth. Override JWT_SECRET in production; this default is for dev/test only.
tripin.auth.jwt.secret=${JWT_SECRET:tripin-dev-secret-please-override-in-production-32b}
tripin.auth.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:7200}
tripin.auth.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:604800}
# When true, requests without an Authorization header fall back to x-user-id / demo user.
# Flip to false in production to require JWT on every protected endpoint.
tripin.auth.allow-header-fallback=${AUTH_ALLOW_HEADER_FALLBACK:true}

# Kafka. Dev default points to the docker-compose broker on localhost:9092.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:tripin-api}
tripin.kafka.topics.post-published=${KAFKA_TOPIC_POST_PUBLISHED:tripin.post.published.v1}
tripin.kafka.dedup.ttl-seconds=${KAFKA_DEDUP_TTL_SECONDS:604800}
